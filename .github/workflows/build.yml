name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build HypoMux (${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka zstandard

      - name: Get version from tag / commit
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build with Nuitka
        shell: cmd
        run: |
          python -m nuitka --standalone --onefile ^
            --assume-yes-for-downloads ^
            --enable-plugin=pyside6 ^
            --windows-console-mode=disable ^
            --windows-uac-admin ^
            --windows-icon-from-ico=assets/icon.ico ^
            --include-package-data=qfluentwidgets ^
            --include-data-dir=assets=assets ^
            --python-flag=-O ^
            --lto=yes ^
            main.py
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%

      - name: Locate and rename artifact
        shell: cmd
        run: |
          set ARTIFACT=HypoMux-${{ steps.version.outputs.VERSION }}.exe
          :: Onefile output is main.exe in the working directory
          if exist main.exe (
            echo Found main.exe, renaming to %ARTIFACT%
            move main.exe "%ARTIFACT%"
          ) else (
            echo Searching for built .exe files...
            dir /s /b *.exe 2>nul
            echo ::error::No .exe file found after Nuitka build
            exit /b 1
          )
          if exist "%ARTIFACT%" (
            echo ✓ Build successful: %ARTIFACT%
          ) else (
            echo ::error::Rename failed, %ARTIFACT% not found
            exit /b 1
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HypoMux-${{ steps.version.outputs.VERSION }}
          path: HypoMux-${{ steps.version.outputs.VERSION }}.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: HypoMux-${{ github.ref_name }}
          path: ./

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: '{"template":"# Changes\n\n#{{CHANGELOG}}\n\n**Full Changelog**: #{{UNRELEASED_TAG_DIFF}}","categories":[{"title":"## 🚀 Features","labels":["feature","enhancement"]},{"title":"## 🐛 Fixes","labels":["fix","bug"]},{"title":"## 🧪 Misc","labels":["documentation","chore","ci"]}],"ignore_labels":["skip-changelog"]}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: HypoMux-${{ github.ref_name }}.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
