name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build HypoMux (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka zstandard PySide6-Fluent-Widgets

      - name: Get version string
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build with Nuitka
        run: |
          nuitka --standalone --onefile `
            --assume-yes-for-downloads `
            --enable-plugin=pyside6 `
            --include-qt-plugins=sensible `
            --windows-console-mode=disable `
            --windows-uac-admin `
            --windows-icon-from-ico=assets/icon.ico `
            --include-package-data=qfluentwidgets `
            --include-data-dir=assets=assets `
            --python-flag=-O `
            --lto=yes `
            main.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rename artifact
        run: |
          $name = "HypoMux-${{ steps.version.outputs.VERSION }}.exe"
          if (Test-Path main.exe) {
            Move-Item main.exe $name -Force
            Write-Host "✓ Renamed main.exe -> $name"
          } elseif (Test-Path "main.dist\main.exe") {
            Move-Item "main.dist\main.exe" $name -Force
            Write-Host "✓ Renamed main.dist\main.exe -> $name"
          } else {
            Write-Host "Searching for any .exe files..."
            Get-ChildItem -Recurse -Filter *.exe | ForEach-Object { Write-Host "  $($_.FullName) ($([math]::Round($_.Length/1MB,1)) MB)" }
            Write-Host "::error::Could not find Nuitka output .exe"
            exit 1
          }
          $size = [math]::Round((Get-Item $name).Length / 1MB, 1)
          Write-Host "✓ Artifact ready: $name ($size MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HypoMux-${{ steps.version.outputs.VERSION }}
          path: HypoMux-${{ steps.version.outputs.VERSION }}.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: HypoMux-${{ github.ref_name }}
          path: ./

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.txt
          files: HypoMux-${{ github.ref_name }}.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
