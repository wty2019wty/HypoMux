<svg xmlns="http://www.w3.org/2000/svg" width="220" height="28" viewBox="0 0 220 28">
  <defs>
    <!-- 右侧专用的浅蓝浅粉动态渐变 -->
    <linearGradient id="right-flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0F7FA">
        <animate attributeName="stop-color" values="#E0F7FA;#FCE4EC;#E0F7FA" dur="3.5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#FCE4EC">
        <animate attributeName="stop-color" values="#FCE4EC;#E0F7FA;#FCE4EC" dur="3.5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  
  <!-- 左栏：固色背景 -->
  <rect width="63" height="28" fill="#E6E6FA" />
  <!-- 右栏：动态渐变背景 -->
  <rect x="63" width="80" height="28" fill="url(#right-flow)" />
  
  <!-- 左侧图标与文字 -->
  <g transform="translate(10, 6.5) scale(0.65)">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#6A5ACD" />
  </g>
  <text x="32" y="18" fill="#6A5ACD" font-family="system-ui, sans-serif" font-weight="900" font-size="11" letter-spacing="1.5">匿名</text>
  
  <!-- 右侧文字 -->
  <text x="73" y="18" fill="#4A148C" font-family="system-ui, sans-serif" font-weight="900" font-size="11" letter-spacing="1">给猫咪发电</text>
</svg>
